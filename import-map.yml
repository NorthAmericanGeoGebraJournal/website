    keywords:
      - "van Hiele"
      - "phase-based instruction"
      - "Dual Language Programme (DLP)"
      - "geometry"
    abstract: "This study generally aims to study the effects of teaching using the van Hiele phase-based instruction using GeoGebra on Year 2 (8 years old) pupil’s achievement in learning shape and space whom learning mathematics using English language as this is their second language. Samples has been taken from one Dual Language Programme (DLP) school in Penang. 14 boys and 16 girls from one Year 2 DLP school have been involved in this study. The research design is one group pretest - posttest research design using Shape and Space Achievement test (SSAT) as instrument. Interview protocol also has been carried out to sample group that used GeoGebra. Paired samples t-test and the Wilcoxon Signed Rank test were used to analyse the data. The results indicated that: (1) there is a significant effect of teaching using the van Hiele’s phase-based instruction using GeoGebra on Year 2 pupils’ achievement in learning shape and space; (2) there is a significant difference in retention of achievement in the topic of Shape and Space on Year 2 pupils who learned the topic through the van Hiele’s phase-based instruction using GeoGebra. Implications of the study and suggestions are also discussed in this study. Keywords: GeoGebra, the van Hiele Theory, phase-based instruction, Dual Language Programme (DLP)"

