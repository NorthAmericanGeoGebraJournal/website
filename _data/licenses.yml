# SPDX identifier -> canonical licence URL and display name.
#
# The schema stores SPDX ids (CC-BY-NC-SA-4.0); pages need a URL to link and a
# human name to print. Keep this in step with the `license` enum in
# schemas/metadata.schema.json.

CC-BY-4.0:
  url: https://creativecommons.org/licenses/by/4.0/
  name: CC BY 4.0

CC-BY-SA-4.0:
  url: https://creativecommons.org/licenses/by-sa/4.0/
  name: CC BY-SA 4.0

CC-BY-NC-4.0:
  url: https://creativecommons.org/licenses/by-nc/4.0/
  name: CC BY-NC 4.0

CC-BY-NC-SA-4.0:
  url: https://creativecommons.org/licenses/by-nc-sa/4.0/
  name: CC BY-NC-SA 4.0
