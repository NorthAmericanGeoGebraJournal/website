# Apply a reviewed import map: copy the legacy PDFs in and write the records.
#
# Run this only after import-map.yml has been reviewed and merged (see
# import-archive.yml, which proposes it). This is the step that moves the PDFs
# (~150MB) -- entirely between GitHub and GitHub. Nothing is downloaded to, or
# uploaded from, a laptop.
#
# Existing _articles records are never overwritten: the upstream metadata is
# lossy (diacritics stripped, affiliations truncated, no emails), so anything
# corrected by hand wins. Use force_overwrite only if you mean to discard those
# corrections.

name: Apply legacy archive import

on:
  workflow_dispatch:
    inputs:
      upstream:
        description: "Repo holding the legacy PDFs."
        required: false
        default: ohiomathteacher/ggb-journal
        type: string
      map:
        description: "Path to the reviewed import map."
        required: false
        default: import-map.yml
        type: string
      branch:
        description: "Branch to open the PR from."
        required: false
        default: import/legacy-archive
        type: string
      force_overwrite:
        description: "Overwrite existing _articles records (discards hand corrections)."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pyyaml jsonschema

      - name: Check the map exists
        run: |
          if [ ! -f "${{ inputs.map }}" ]; then
            echo "::error::no import map at '${{ inputs.map }}'. Run 'Propose legacy archive import' first, review the slug keywords, and merge that PR."
            exit 1
          fi

      # Unlike the propose step, this one genuinely needs the PDF blobs. Sparse
      # checkout still skips everything else in the upstream repo.
      - name: Fetch upstream PDFs
        run: |
          git clone --no-checkout --filter=blob:none --depth=1 \
            "https://github.com/${{ inputs.upstream }}" upstream
          git -C upstream sparse-checkout set pdfs
          git -C upstream checkout
          echo "fetched $(ls -1 upstream/pdfs/*.pdf | wc -l) PDFs ($(du -sh upstream/pdfs | cut -f1))"

      - name: Apply the map
        run: |
          python scripts/apply_import_map.py \
            --map "${{ inputs.map }}" \
            --pdf-dir upstream/pdfs \
            ${{ inputs.force_overwrite && '--force' || '' }} \
            | tee apply.log

      # The gate. A record that fails the schema must never reach the site, and
      # a bad import is far easier to reject here than to unpick after merge.
      - name: Validate every record
        run: python scripts/validate_metadata.py --format github

      - name: Summarise
        run: |
          {
            echo "## Legacy archive import"
            echo
            echo '```'
            tail -20 apply.log
            echo '```'
            echo
            echo "- article records: **$(ls -1 _articles/*.md | wc -l)**"
            echo "- PDFs in assets: **$(find assets/papers -name '*.pdf' | wc -l)**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open a PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf upstream apply.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ inputs.branch }}"
          git add _articles assets/papers
          if git diff --cached --quiet; then
            echo "nothing to import; every record and PDF is already present."
            exit 0
          fi
          git commit -m "Import legacy archive from ${{ inputs.upstream }}"
          git push --force origin "${{ inputs.branch }}"
          gh pr create \
            --title "Import legacy archive" \
            --body "Generated by \`apply_import_map.py\` from \`${{ inputs.map }}\`.

          Every record was validated against \`schemas/metadata.schema.json\` before this PR was opened. Existing records were left untouched.

          See the workflow run summary for counts and anything skipped." \
            --head "${{ inputs.branch }}" \
            || echo "PR already exists for this branch; it has been updated."
