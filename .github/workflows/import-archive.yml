# Propose an import mapping for the legacy PDF archive.
#
# The 89 legacy PDFs live in a separate repo (ohiomathteacher/ggb-journal, which
# this repo is a fork of). Importing them means renaming vXXnY-surname.pdf to
# NAGJ's surnameYYYYkeyword.pdf convention and writing an _articles record for
# each.
#
# The point of running this in CI rather than locally: the archive is ~150MB and
# every byte moves GitHub-to-GitHub inside their datacenter. Nothing is
# downloaded to, or uploaded from, anyone's laptop.
#
# This workflow only PROPOSES. It opens a PR containing import-map.yml, whose
# slug keywords are guesses that a human must review -- the keyword in
# `campuzano2023tracing` is an editorial choice, not a derivable fact. Applying
# the reviewed map is a separate step.

name: Propose legacy archive import

on:
  workflow_dispatch:
    inputs:
      upstream:
        description: "Repo holding the legacy PDFs."
        required: false
        default: ohiomathteacher/ggb-journal
        type: string
      branch:
        description: "Branch to open the PR from."
        required: false
        default: import/legacy-archive-map
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pyyaml

      # We need the details pages (articles/*.html, ~420KB total), not the PDFs
      # (~150MB). --no-checkout is load-bearing: `--filter=blob:none` alone still
      # materialises a working tree, which drags every PDF blob down anyway
      # (123MB measured). Cloning with no checkout, then sparse-checking-out only
      # articles/, fetches just the blobs we actually read -- 288KB measured.
      - name: Fetch upstream details pages (not the PDFs)
        run: |
          git clone --no-checkout --filter=blob:none --depth=1 \
            "https://github.com/${{ inputs.upstream }}" upstream
          git -C upstream sparse-checkout set articles
          git -C upstream checkout
          echo "fetched $(ls -1 upstream/articles/*.html | wc -l) details pages"
          echo "PDFs downloaded: $(ls upstream/pdfs 2>/dev/null | wc -l) (expected 0)"

      - name: Propose the mapping
        run: python scripts/propose_import_map.py --details-dir upstream/articles --out import-map.yml

      - name: Summarise for review
        run: |
          python - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import collections
          import yaml
          d = yaml.safe_load(open("import-map.yml"))
          arts, probs = d["articles"], d["problems"] or []
          dupes = {s for s, n in collections.Counter(a["slug"] for a in arts).items() if n > 1}

          print("## Legacy import proposal\n")
          print(f"- extracted: **{len(arts)}**")
          print(f"- needing a human decision: **{len(probs)}**")
          print(f"- slug collisions to resolve: **{len(dupes)}**\n")

          if probs:
              print("### Could not be extracted\n")
              for p in probs:
                  print(f"- `{p['file']}` — {p['reason']}")
              print()
          if dupes:
              print("### Slug collisions — must be given distinct keywords\n")
              for slug in sorted(dupes):
                  print(f"- `{slug}`")
                  for a in arts:
                      if a["slug"] == slug:
                          print(f"  - `{a['pdf']}` — {a['title']}")
              print()

          print("Every `slug` keyword is a guess from the title. Review before applying.\n")
          print("| PDF | proposed slug | pages |")
          print("|---|---|---|")
          for a in arts:
              print(f"| `{a['pdf']}` | `{a['slug']}` | {a['pages'] or '—'} |")
          EOF

      - name: Open a PR with the proposed map
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ inputs.branch }}"
          git add import-map.yml
          git commit -m "Propose legacy archive import mapping"
          git push --force origin "${{ inputs.branch }}"
          gh pr create \
            --title "Propose legacy archive import mapping" \
            --body "Generated by \`propose_import_map.py\` from \`${{ inputs.upstream }}\`.

          **Review the \`slug\` keywords before this is applied.** Each one is guessed from the first non-trivial word of the title; they are editorial choices, not derived facts.

          See the workflow run summary for the full table and any unresolved files." \
            --head "${{ inputs.branch }}" \
            || echo "PR already exists for this branch; it has been updated."
